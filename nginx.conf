server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Vite assets.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path serves index.html so client-side
    # routing keeps working without 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
